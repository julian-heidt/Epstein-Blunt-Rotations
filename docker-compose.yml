# Docker Swarm stack file.
#
# Build & push images:
#   docker compose build
#   docker tag evilblunts-backend:latest jheidt04/evilblunts-backend:latest
#   docker tag evilblunts-frontend:latest jheidt04/evilblunts-frontend:latest
#   docker push jheidt04/evilblunts-backend:latest
#   docker push jheidt04/evilblunts-frontend:latest
#
# Deploy to swarm:
#   docker stack deploy -c docker-compose.yml ebr
#
# Env vars must be exported before deploying:
#   export $(grep -v '^#' .env | xargs) && docker stack deploy -c docker-compose.yml ebr
#
# Or deploy via Portainer Git integration (images must be pushed first).

volumes:
  mongo_data:
    driver: local
    # NFS is not supported for MongoDB data files — WiredTiger requires POSIX
    # advisory file locking that NFS does not reliably provide, causing write
    # failures while reads appear to work (served from WiredTiger cache).
    # Using a plain local Docker volume; the placement constraint below keeps
    # mongo pinned to the same manager node so the volume is always found.

networks:
  ebr-net:
    driver: overlay

services:
  mongo:
    image: mongo:4.4
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: evil_blunts
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    networks:
      - ebr-net
    healthcheck:
      test: mongo --eval "db.runCommand('ping').ok" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.workload == high
          - node.labels.media != true
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 1G
          cpus: "1.00"
        reservations:
          memory: 512M

  backend:
    image: jheidt04/evilblunts-backend:latest
    build: ./backend
    environment:
      MONGO_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_HOST: "mongo:27017"
      MONGO_DB: "evil_blunts"
      FORCE_RESEED: "false"
      PYTHONUNBUFFERED: "1"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://evilblunts.org,http://localhost:3500}
    networks:
      - ebr-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      placement:
        constraints:
          - node.labels.media != true
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 256M

  frontend:
    image: jheidt04/evilblunts-frontend:latest
    build: ./frontend
    ports:
      - "3500:3500"
    networks:
      - ebr-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3500/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      placement:
        constraints:
          - node.labels.media != true
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
